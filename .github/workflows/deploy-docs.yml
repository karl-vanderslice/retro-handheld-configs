name: deploy-docs

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - "docs/**"
      - "zensical.toml"
      - ".github/workflows/deploy-docs.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN_PRESENT: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
      CLOUDFLARE_ACCOUNT_ID_PRESENT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
      CLOUDFLARE_PAGES_PROJECT_PRESENT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build docs
        run: nix develop -c zensical build

      - name: Warn when Cloudflare deploy is skipped
        if: ${{ env.CLOUDFLARE_API_TOKEN_PRESENT != 'true' || env.CLOUDFLARE_ACCOUNT_ID_PRESENT != 'true' || env.CLOUDFLARE_PAGES_PROJECT_PRESENT != 'true' }}
        run: |
          echo "::warning::Skipping Cloudflare Pages deploy because one or more Cloudflare deploy secrets are not configured."

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN_PRESENT == 'true' && env.CLOUDFLARE_ACCOUNT_ID_PRESENT == 'true' && env.CLOUDFLARE_PAGES_PROJECT_PRESENT == 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}

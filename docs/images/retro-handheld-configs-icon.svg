<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Retro Handheld Configs Icon</title>
  <desc id="desc">A retro handheld gaming device representing handheld configuration management.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="device" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Device body -->
  <rect x="120" y="72" width="272" height="368" rx="40" fill="#1e293b" stroke="url(#device)" stroke-width="10"/>

  <!-- Screen -->
  <rect x="160" y="108" width="192" height="144" rx="12" fill="#0b1220" stroke="#a78bfa" stroke-width="6"/>

  <!-- Screen content: pixel grid hint -->
  <g fill="#7c3aed" opacity="0.5">
    <rect x="184" y="140" width="16" height="16" rx="2"/>
    <rect x="208" y="140" width="16" height="16" rx="2"/>
    <rect x="232" y="140" width="16" height="16" rx="2"/>
    <rect x="208" y="164" width="16" height="16" rx="2"/>
    <rect x="256" y="164" width="16" height="16" rx="2"/>
    <rect x="280" y="140" width="16" height="16" rx="2"/>
    <rect x="304" y="164" width="16" height="16" rx="2"/>
    <rect x="184" y="188" width="16" height="16" rx="2"/>
    <rect x="256" y="188" width="16" height="16" rx="2"/>
    <rect x="304" y="188" width="16" height="16" rx="2"/>
  </g>

  <!-- D-pad -->
  <g fill="#0b1220" stroke="#a78bfa" stroke-width="4">
    <rect x="160" y="296" width="24" height="56" rx="6"/>
    <rect x="144" y="312" width="56" height="24" rx="6"/>
  </g>

  <!-- Action buttons -->
  <circle cx="336" cy="308" r="16" fill="#0b1220" stroke="#a78bfa" stroke-width="4"/>
  <circle cx="368" cy="332" r="16" fill="#0b1220" stroke="#7c3aed" stroke-width="4"/>

  <!-- Start/Select buttons -->
  <rect x="224" y="380" width="28" height="10" rx="5" fill="#a78bfa" opacity="0.6"/>
  <rect x="260" y="380" width="28" height="10" rx="5" fill="#a78bfa" opacity="0.6"/>
</svg>
